<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeStrong - Coaching Personnel</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* STYLE GLOBAL */
    body {
      font-family: 'Lora', serif;
      font-size: 18px;
      margin: 0;
      color: #333;
      line-height: 1.6;
    }

    h1, h2, h3 {
      font-family: 'Roboto', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    a {
      text-decoration: none;
    }

    /* COMPONENTS */
    .container {
      width: 900px;
      margin: 0 auto;
      padding: 40px 0;
    }

    /* BANNER */
    .banner {
      background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1000');
      background-size: cover;
      background-position: center;
      color: white;
      padding: 150px 0;
      text-align: center;
    }

    .banner h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .banner h2 {
      font-size: 24px;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    /* BUTTON */
    .btn-blue {
      background-color: #E16B6B; /* Changé en corail pour le dynamisme */
      color: white;
      padding: 18px 30px;
      border-radius: 50px;
      display: inline-block;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .btn-blue:hover {
      background-color: #c95a5a;
    }

    /* CARDS */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .card {
      display: flex;
      flex-direction: column; /* Image au-dessus du texte */
      align-items: center;
      padding: 0;
      flex-basis: 250px;
      flex-grow: 1;
      margin: 15px;
      background: white;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h3 {
      padding: 20px;
      margin: 0;
      text-align: center;
    }

    /* Responsive simple */
    @media (max-width: 960px) {
      .container { width: 90%; }
    }
  </style>
</head>

<body>

  <div class="banner">
    <div class="container">
      <h1>Dépassez vos limites</h1>
      <h2>Coaching personnalisé pour transformer votre corps et votre esprit.</h2>
      <a href="#" class="btn-blue">Réserver ma séance</a>
    </div>
  </div>

  <div class="container">
    <h2 style="text-align: center; margin-bottom: 40px;">Nos Programmes</h2>

    <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=500" alt="Fitness">
        <h3>Remise en forme</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?q=80&w=500" alt="Musculation">
        <h3>Prise de masse</h3>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?q=80&w=500" alt="Yoga">
        <h3>Mobilité & Yoga</h3>
      </div>

    </div>
  </div>

</body>
</html>
